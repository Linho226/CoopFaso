{% extends 'accounts/base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-shell mx-auto" style="max-width: 620px;">
    <div class="auth-card">
        <h1 class="h4 fw-bold mb-2">Modifier le role</h1>
        <p class="text-muted">{{ managed_user.get_full_name|default:managed_user.username }}</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label" for="{{ form.role.id_for_label }}">{{ form.role.label }}</label>
            {{ form.role }}
          </div>
          <div class="mb-4">
            <label class="form-label" for="{{ form.cooperative.id_for_label }}">{{ form.cooperative.label }}</label>
            {{ form.cooperative }}
            <div class="form-text">Obligatoire pour un responsable de cooperative et recommande pour un agriculteur.</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-success" type="submit">Enregistrer</button>
            <a class="btn btn-outline-secondary" href="{% url 'accounts:user_roles' %}">Annuler</a>
          </div>
        </form>
    </div>
  </div>
</div>
{% endblock %}
