{% extends 'accounts/base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-shell mx-auto" style="max-width: 620px;">
    <div class="auth-card">
        <h1 class="h4 fw-bold mb-4">Nouveau mot de passe</h1>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <button class="btn btn-success btn-lg w-100" type="submit">Changer le mot de passe</button>
        </form>
    </div>
  </div>
</div>
{% endblock %}
