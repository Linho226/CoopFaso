{% extends 'accounts/base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-shell mx-auto" style="max-width: 620px;">
    <div class="auth-card">
        <h1 class="h4 fw-bold mb-2">Reinitialisation du mot de passe</h1>
        <p class="text-muted mb-4">Indiquez votre email pour recevoir un lien de reinitialisation.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label" for="{{ form.email.id_for_label }}">{{ form.email.label }}</label>
            {{ form.email }}
          </div>
          <button class="btn btn-success btn-lg w-100" type="submit">Envoyer le lien</button>
        </form>
    </div>
  </div>
</div>
{% endblock %}
