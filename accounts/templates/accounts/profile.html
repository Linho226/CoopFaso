{% extends base_template %}

{% block content %}
<div class="py-5 buyer-public-page">
  <div class="auth-shell mx-auto" style="max-width: 760px;">
    <div class="auth-card">
      <h1 class="h3 fw-bold mb-2">Mon profil</h1>
      <p class="text-muted mb-4">Mettez a jour vos informations personnelles.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
            <div class="col-md-6">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
            </div>
          {% endfor %}
        </div>
        <button class="btn btn-success mt-4" type="submit">Enregistrer</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
