{% extends 'accounts/base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="dashboard-panel p-4 p-lg-5">
    <div class="d-flex flex-column flex-lg-row justify-content-between gap-4">
      <div>
        <p class="auth-badge mb-3">Tableau de bord</p>
        <h1 class="display-6 fw-bold mb-2">Bienvenue, {{ user.get_full_name|default:user.username }}</h1>
        <p class="text-muted mb-0">Votre espace CoopFaso est pret pour les prochains modules.</p>
      </div>
      <div class="align-self-start">
        <span class="role-chip">{{ profile.get_role_display|default:'Non defini' }}</span>
      </div>
    </div>
  </div>
</div>
{% endblock %}
