{% extends 'accounts/base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-shell mx-auto" style="max-width:620px">
    <div class="auth-card">
      <h1 class="h4 fw-bold">Supprimer cette actualite ?</h1>
      <p class="text-muted">« {{ news.title }} » sera definitivement supprimee.</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button class="btn btn-danger" type="submit">Supprimer</button>
          <a class="btn btn-outline-secondary" href="{% url 'public_site:news_manage_list' %}">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
