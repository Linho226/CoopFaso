{% extends 'accounts/base.html' %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-shell mx-auto" style="max-width: 620px;">
    <div class="auth-card">
      <p class="auth-badge mb-3">Suppression</p>
      <h1 class="h4 fw-bold mb-2">Supprimer ce produit ?</h1>
      <p class="text-muted">Etes-vous sur de vouloir supprimer le produit <strong>{{ product.name }}</strong> ? Cette action est irreversible.</p>
      <form method="post" class="d-flex flex-wrap gap-2 mt-4">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Supprimer</button>
        <a class="btn btn-outline-secondary" href="{% url 'products:detail' product.pk %}">Annuler</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
